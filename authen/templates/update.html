{% extends 'main.html' %}

    {% block content %}
    <div class="auth-container">
        <div class="auth-card">
        <br><h1>Update Profile</h1><br>
            <form action="" method="POST">
                {% csrf_token %}
                <label for="">First Name:</label>
                <input type="text" name="fname" id="" value="{{request.user.first_name}}"><br><br>

                <label for="">Last Name:</label>
                <input type="text" name="lname" id="" value="{{request.user.last_name}}"><br><br>

                <label for="">Email:</label>
                <input type="email" name="email" id="" value="{{request.user.email}}"><br><br>
                
                <label for="">Username:</label>
                <input type="text" name="uname" id="" value="{{request.user.username}}"><br><br>

                <button type="submit">Update</button>
            </form>
        </div>
    </div>
        
    {% endblock %}
